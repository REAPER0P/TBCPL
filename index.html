<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Project Hub</title>
    <meta name="color-scheme" content="dark">
    <link rel="icon" href="/logo.png" type="image/png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pace/1.2.4/pace.min.js"></script>
    <link rel="stylesheet" href="./css/flash.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#04070f;--surface:#080f1e;--card:#0b1225;--card2:#0d1530;
            --border:rgba(0,212,255,.15);--neon:#00d4ff;--neon2:#7b2ff7;--neon3:#ff2d78;
            --text:#bdd0e8;--text-dim:#3d5570;
            --glow:0 0 22px rgba(0,212,255,.3);
        }
        html{scroll-behavior:smooth}
        body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}

        /* CANVAS */
        #particleCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}

        /* SPOTLIGHT */
        .spotlight{position:fixed;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.045) 0%,transparent 70%);transform:translate(-50%,-50%);pointer-events:none;z-index:1;transition:left .08s,top .08s}

        /* MESH */
        .mesh-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
            background:
                radial-gradient(ellipse 700px 500px at 10% 15%,rgba(123,47,247,.1) 0%,transparent 65%),
                radial-gradient(ellipse 600px 400px at 90% 80%,rgba(0,212,255,.08) 0%,transparent 65%),
                radial-gradient(ellipse 400px 300px at 55% 45%,rgba(255,45,120,.05) 0%,transparent 65%);
            animation:meshShift 12s ease-in-out infinite alternate}
        @keyframes meshShift{0%{opacity:1;transform:scale(1)}100%{opacity:.6;transform:scale(1.07)}}

        /* NAVBAR */
        .navbar{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;
            background:rgba(4,7,15,.7);backdrop-filter:blur(24px) saturate(180%);
            border-bottom:1px solid var(--border);animation:navSlide .7s cubic-bezier(.22,1,.36,1) both}
        @keyframes navSlide{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
        .navbar.scrolled{background:rgba(4,7,15,.93);border-bottom-color:rgba(0,212,255,.28)}
        .nav-container{max-width:1300px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
        .nav-logo{text-decoration:none;display:flex;align-items:center;gap:10px;
            font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.15rem;
            color:var(--neon);letter-spacing:2px;position:relative}
        .nav-logo::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;
            background:linear-gradient(90deg,var(--neon),transparent);
            transform:scaleX(0);transform-origin:left;transition:transform .35s}
        .nav-logo:hover::after{transform:scaleX(1)}
        .nav-logo-img{width:28px;height:28px;border-radius:7px}
        .nav-menu{list-style:none;display:flex;gap:4px}
        .nav-link{text-decoration:none;color:var(--text-dim);font-size:.88rem;font-weight:600;letter-spacing:1px;
            padding:8px 16px;border-radius:8px;border:1px solid transparent;transition:all .22s;
            display:flex;align-items:center;gap:7px;position:relative;overflow:hidden}
        .nav-link::before{content:'';position:absolute;inset:0;background:rgba(0,212,255,.08);
            transform:translateX(-100%);transition:transform .25s}
        .nav-link:hover::before,.nav-link.active::before{transform:translateX(0)}
        .nav-link:hover,.nav-link.active{color:var(--neon);border-color:var(--border)}
        .nav-toggle{display:none;background:none;border:1px solid var(--border);border-radius:8px;
            color:var(--neon);font-size:1.1rem;cursor:pointer;padding:8px 10px;transition:all .2s}
        .nav-toggle:hover{background:rgba(0,212,255,.1)}

        /* CONTAINER */
        .container{position:relative;z-index:10;max-width:1300px;margin:0 auto;padding:0 24px 80px}

        /* HERO */
        .hero-section{padding:140px 0 70px;text-align:center;position:relative}
        .hero-eyebrow{display:inline-flex;align-items:center;gap:10px;
            font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:5px;color:var(--neon2);
            border:1px solid rgba(123,47,247,.35);background:rgba(123,47,247,.08);
            padding:6px 20px;border-radius:100px;margin-bottom:28px;
            animation:fadeUp .8s .1s ease both}
        .dot{width:6px;height:6px;border-radius:50%;background:var(--neon2);animation:blink 1.5s ease-in-out infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
        .hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(2.6rem,7vw,5.5rem);font-weight:900;line-height:1.05}
        .word-project{color:#fff;display:inline-block;animation:fadeUp .8s .2s ease both}
        .word-hub{display:inline-block;color:transparent;-webkit-text-stroke:2px var(--neon);
            filter:drop-shadow(0 0 20px rgba(0,212,255,.6));
            animation:fadeUp .8s .3s ease both,hubPulse 3s ease-in-out infinite}
        @keyframes hubPulse{0%,100%{filter:drop-shadow(0 0 20px rgba(0,212,255,.6))}50%{filter:drop-shadow(0 0 42px rgba(0,212,255,.95))}}
        .hero-divider{display:flex;align-items:center;justify-content:center;gap:16px;margin:24px auto;animation:fadeUp .8s .35s ease both}
        .hdl{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--neon))}
        .hdl:last-child{transform:scaleX(-1)}
        .hdd{width:8px;height:8px;background:var(--neon);transform:rotate(45deg);box-shadow:0 0 12px var(--neon)}
        .subtitle{font-size:1rem;color:var(--text-dim);letter-spacing:3px;min-height:1.6em;animation:fadeUp .8s .4s ease both}
        .cursor{display:inline-block;width:2px;height:1em;background:var(--neon);margin-left:2px;vertical-align:middle;animation:cursorBlink .7s step-end infinite}
        @keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

        /* SEARCH */
        .search-wrapper{position:sticky;top:64px;z-index:100;
            background:rgba(4,7,15,.8);backdrop-filter:blur(24px);
            border-bottom:1px solid var(--border);padding:14px 0;
            animation:fadeUp .8s .5s ease both}
        .search-inner{max-width:1300px;margin:0 auto;padding:0 24px}
        .search-box{position:relative;margin-bottom:12px}
        .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:.9rem;transition:color .25s;pointer-events:none}
        .search-box:focus-within .search-icon{color:var(--neon)}
        .search-pill{width:100%;padding:14px 16px 14px 46px;border-radius:12px;
            border:1px solid var(--border);background:var(--card);color:var(--text);
            font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:.5px;outline:none;
            transition:border-color .25s,box-shadow .25s,background .25s}
        .search-pill:focus{border-color:var(--neon);background:var(--card2);box-shadow:var(--glow),inset 0 0 0 1px rgba(0,212,255,.08)}
        .search-pill::placeholder{color:var(--text-dim)}
        .filter-buttons{display:flex;flex-wrap:wrap;gap:8px}
        .filter-btn{padding:7px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;
            color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:1px;
            cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
        .ripple{position:absolute;border-radius:50%;background:rgba(0,212,255,.22);
            transform:scale(0);animation:rippleAnim .55s linear;pointer-events:none}
        @keyframes rippleAnim{to{transform:scale(4);opacity:0}}
        .filter-btn:hover{color:var(--neon);border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.06)}
        .filter-btn.active{background:rgba(0,212,255,.12);border-color:var(--neon);color:var(--neon);box-shadow:0 0 16px rgba(0,212,255,.2)}

        /* SECTIONS */
        .section{margin:52px 0;opacity:0;transform:translateY(32px);transition:opacity .6s ease,transform .6s ease}
        .section.visible{opacity:1;transform:translateY(0)}
        .section-header{font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:4px;
            color:var(--neon);text-transform:uppercase;margin-bottom:22px;
            display:flex;align-items:center;gap:14px}
        .section-header::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,212,255,.3),transparent)}

        /* CARDS */
        .links-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
        @media(min-width:480px){.links-grid{grid-template-columns:repeat(2,1fr)}}
        @media(min-width:768px){.links-grid{grid-template-columns:repeat(3,1fr)}}
        @media(min-width:1024px){.links-grid{grid-template-columns:repeat(4,1fr)}}
        .link-card{
            display:flex;flex-direction:column;align-items:stretch;justify-content:flex-end;
            border-radius:16px;border:1px solid var(--border);
            background:var(--card);text-decoration:none;
            height:120px;
            position:relative;overflow:hidden;
            opacity:0;transform:translateY(18px) scale(.97);
            transition:opacity .4s ease,transform .4s ease,border-color .3s,box-shadow .3s}
        .link-card.cv{opacity:1;transform:translateY(0) scale(1)}
        /* shimmer */
        .link-card::before{content:'';position:absolute;inset:0;z-index:3;
            background:linear-gradient(105deg,transparent 40%,rgba(0,212,255,.08) 50%,transparent 60%);
            transform:translateX(-100%)}
        .link-card:hover::before{transform:translateX(100%);transition:transform .55s ease}
        /* top accent line */
        .link-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:4;
            background:linear-gradient(90deg,var(--neon2),var(--neon));
            transform:scaleX(0);transform-origin:left;transition:transform .3s}
        .link-card:hover::after{transform:scaleX(1)}
        .link-card:hover{border-color:rgba(0,212,255,.4);transform:translateY(-5px) scale(1) !important;
            box-shadow:0 10px 36px rgba(0,0,0,.55),0 0 18px rgba(0,212,255,.13)}
        /* logo fills the card */
        .card-logo{
            position:absolute;inset:0;width:100%;height:100%;
            object-fit:cover;object-position:center;
            border-radius:16px;
            transition:transform .35s ease,filter .3s;
            z-index:1}
        .link-card:hover .card-logo{transform:scale(1.06);filter:brightness(1.1)}
        /* dark gradient overlay at bottom */
        .card-overlay{
            position:absolute;inset:0;z-index:2;
            background:linear-gradient(to top,rgba(4,7,15,.88) 0%,rgba(4,7,15,.3) 45%,transparent 100%)}
        /* name at bottom */
        .card-name{
            position:relative;z-index:3;
            padding:0 10px 9px;
            font-size:.72rem;font-weight:700;letter-spacing:.6px;
            color:rgba(255,255,255,.75);
            text-align:center;
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
            transition:color .25s}
        .link-card:hover .card-name{color:#fff}

        /* FOOTER */
        .footer{text-align:center;padding:50px 0 20px;border-top:1px solid var(--border);margin-top:60px}
        .footer-heart{display:inline-block;animation:hb 1.5s ease infinite;color:#ff2d78}
        @keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
        .footer p{color:var(--text-dim);font-size:.85rem;letter-spacing:1px;margin:7px 0}
        .footer .copyright{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:4px;margin-top:10px}

        /* SCROLL TOP */
        .scroll-top-btn{position:fixed;bottom:28px;right:28px;width:52px;height:52px;
            background:var(--card);border:1px solid var(--border);border-radius:50%;cursor:pointer;
            display:flex;align-items:center;justify-content:center;color:var(--neon);
            opacity:0;transform:translateY(20px) scale(.8);
            transition:opacity .3s,transform .3s,box-shadow .3s;z-index:300}
        .scroll-top-btn.visible{opacity:1;transform:translateY(0) scale(1)}
        .scroll-top-btn:hover{box-shadow:var(--glow),0 0 40px rgba(0,212,255,.2)}
        .scroll-top-btn svg{position:absolute;width:52px;height:52px;transform:rotate(-90deg)}
        .progress-bg{fill:none;stroke:rgba(0,212,255,.1);stroke-width:2.5}
        .progress-ring{fill:none;stroke:var(--neon);stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .1s}
        .arrow{position:absolute;font-size:.85rem}

        /* MOBILE */
        @media(max-width:640px){
            .nav-toggle{display:block}
            .nav-menu{display:none;flex-direction:column;position:absolute;top:64px;left:0;right:0;
                background:rgba(4,7,15,.97);border-bottom:1px solid var(--border);padding:12px;gap:4px}
            .nav-menu.open{display:flex;animation:menuDrop .25s ease}
            @keyframes menuDrop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
            .hero-section{padding:110px 0 50px}
            .links-grid{grid-template-columns:repeat(2,1fr);gap:8px}
            .link-card{height:100px}
            .card-name{font-size:.65rem;padding:0 8px 7px}
        }
    </style>
</head>
<body>

<div class="spotlight" id="spotlight"></div>
<div class="mesh-bg"></div>
<canvas id="particleCanvas"></canvas>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">
            <img src="logo.png" alt="Project Hub" class="nav-logo-img"> PROJECT HUB
        </a>
        <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html" class="nav-link active"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="site-request.html" class="nav-link"><i class="fas fa-plus-circle"></i> Request</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <!-- HERO -->
    <div class="hero-section">
        <div class="hero-eyebrow"><span class="dot"></span> STREAMING COLLECTION <span class="dot"></span></div>
        <h1 class="hero-title"><span class="word-project">Project</span>&nbsp;<span class="word-hub">Hub</span></h1>
        <div class="hero-divider"><div class="hdl"></div><div class="hdd"></div><div class="hdl"></div></div>
        <div class="subtitle"><span id="typeTarget"></span><span class="cursor"></span></div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrapper">
        <div class="search-inner">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-pill" id="searchInput" placeholder="Search for sites...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="movies">Movies / Shows</button>
                <button class="filter-btn" data-filter="anime">Anime</button>
                <button class="filter-btn" data-filter="manga">Manga</button>
                <button class="filter-btn" data-filter="livetv">Live TV / Sports</button>
                <button class="filter-btn" data-filter="apps">Apps</button>
            </div>
        </div>
    </div>

    <div id="categories-container"></div>

    <footer class="footer">
        <p>Curated with <span class="footer-heart">💜</span> by the Project Hub Team</p>
        <p class="copyright">&copy; 2026 PROJECT HUB &nbsp;·&nbsp; ALL RIGHTS RESERVED</p>
    </footer>
</div>

<button class="scroll-top-btn" id="scrollTopBtn">
    <svg viewBox="0 0 50 50">
        <circle class="progress-bg" cx="25" cy="25" r="22"/>
        <circle class="progress-ring" id="progressRing" cx="25" cy="25" r="22"/>
    </svg>
    <i class="fas fa-arrow-up arrow"></i>
</button>

<script>
/* PARTICLES */
(function(){
    const c=document.getElementById('particleCanvas'),ctx=c.getContext('2d');
    let W,H,pts=[];
    function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
    resize();window.addEventListener('resize',resize);
    class P{
        constructor(){this.reset()}
        reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.s=Math.random()*1.4+.3;this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;this.o=Math.random()*.55+.1;this.col=Math.random()>.5?'0,212,255':'123,47,247'}
        update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=W;if(this.x>W)this.x=0;if(this.y<0)this.y=H;if(this.y>H)this.y=0}
        draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fillStyle=`rgba(${this.col},${this.o})`;ctx.fill()}
    }
    for(let i=0;i<90;i++)pts.push(new P());
    function connect(){
        for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
            const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
            if(d<110){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(0,212,255,${.05*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke()}
        }
    }
    (function loop(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.update();p.draw()});connect();requestAnimationFrame(loop)})();
})();

/* SPOTLIGHT */
const sp=document.getElementById('spotlight');
document.addEventListener('mousemove',e=>{sp.style.left=e.clientX+'px';sp.style.top=e.clientY+'px'});

/* TYPEWRITER */
(function(){
    const el=document.getElementById('typeTarget');
    const texts=['Your Curated Streaming Universe 🫶','Movies · Anime · Manga · Live TV','Find Everything In One Place ✨'];
    let ti=0,ci=0,del=false;
    function type(){
        const full=texts[ti];
        el.textContent=del?full.slice(0,ci--):full.slice(0,ci++);
        let d=del?38:72;
        if(!del&&ci>full.length){d=2200;del=true}
        if(del&&ci<0){del=false;ci=0;ti=(ti+1)%texts.length;d=380}
        setTimeout(type,d);
    }
    setTimeout(type,1100);
})();

/* LOAD LINKS */
async function loadLinks(){
    try{
        const data=await(await fetch('links.json')).json();
        const cont=document.getElementById('categories-container');
        data.categories.forEach(cat=>{
            const sec=document.createElement('div');
            sec.className='section';sec.setAttribute('data-category',cat.id);
            sec.innerHTML=`<h2 class="section-header">${cat.name}</h2><div class="links-grid"></div>`;
            cat.sites.filter(s=>s.enabled!==false).forEach(site=>{
                const a=document.createElement('a');
                a.href=site.url;a.target='_blank';a.className='link-card';a.setAttribute('data-name',site.name);
                a.innerHTML=`<img src="${site.logo}" class="card-logo" alt="${site.name}" loading="lazy"><div class="card-overlay"></div><span class="card-name">${site.name}</span>`;
                sec.querySelector('.links-grid').appendChild(a);
            });
            cont.appendChild(sec);
        });
        initObs();
    }catch(e){console.error(e)}
}

function initObs(){
    const so=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.07});
    document.querySelectorAll('.section').forEach(s=>so.observe(s));
    const co=new IntersectionObserver(es=>es.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('cv'),i*35);co.unobserve(e.target)}}),{threshold:.05});
    document.querySelectorAll('.link-card').forEach(c=>co.observe(c));
}

window.addEventListener('DOMContentLoaded',loadLinks);

/* FILTERS */
const si=document.getElementById('searchInput');
const fbs=document.querySelectorAll('.filter-btn');
let af='all';
function applyFilters(){
    const q=si.value.toLowerCase();
    document.querySelectorAll('.section').forEach(sec=>{
        const fm=af==='all'||sec.dataset.category===af;
        let vis=false;
        sec.querySelectorAll('.link-card').forEach(c=>{
            const show=fm&&c.dataset.name.toLowerCase().includes(q);
            c.style.display=show?'flex':'none';if(show)vis=true;
        });
        sec.style.display=(fm&&vis)?'block':'none';
    });
}
si.addEventListener('input',applyFilters);
fbs.forEach(btn=>btn.addEventListener('click',function(e){
    const r=document.createElement('span');r.className='ripple';
    const rect=this.getBoundingClientRect(),sz=Math.max(rect.width,rect.height);
    r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
    this.appendChild(r);setTimeout(()=>r.remove(),600);
    fbs.forEach(b=>b.classList.remove('active'));this.classList.add('active');
    af=this.dataset.filter;applyFilters();
}));

/* NAV */
document.getElementById('navToggle').addEventListener('click',()=>document.getElementById('navMenu').classList.toggle('open'));
window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>40));

/* SCROLL TOP */
(function(){
    const btn=document.getElementById('scrollTopBtn'),ring=document.getElementById('progressRing');
    const C=2*Math.PI*22;ring.style.strokeDasharray=C;ring.style.strokeDashoffset=C;
    window.addEventListener('scroll',()=>{
        const pct=window.scrollY/(document.documentElement.scrollHeight-window.innerHeight);
        ring.style.strokeDashoffset=C-Math.min(pct,1)*C;
        btn.classList.toggle('visible',window.scrollY>200);
    });
    btn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
})();
</script>
</body>
</html>
